name: Launch Solo Founder OS to AWS
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=packages/api

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: |
          npx tsc -p packages/api/tsconfig.json --noEmit
          npx tsc -p packages/infra/tsconfig.json --noEmit

      - name: Run API Tests
        run: npm run test:api

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS Connection
        run: aws sts get-caller-identity

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=packages/api

      - name: Build Application
        run: npm run build

      - name: Deploy Infrastructure
        run: cd packages/infra && npx cdk deploy --all --context stage=production --require-approval never

      - name: Run Database Migration
        run: |
          # Get the task definition, subnets, and security groups from CloudFormation outputs
          CLUSTER_ARN=$(aws cloudformation describe-stacks \
            --stack-name production-container \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterArn`].OutputValue' \
            --output text)

          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix solo-founder-production-api \
            --sort DESC \
            --query 'taskDefinitionArns[0]' \
            --output text)

          # Get private subnets from the VPC
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=solo-founder-production-vpc" \
            --query 'Vpcs[0].VpcId' --output text)

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*PrivateSubnet*" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')

          ECS_SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=solo-founder-production-ecs-sg" \
            --query 'SecurityGroups[0].GroupId' --output text)

          echo "Running migration task..."
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_ARN" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$ECS_SG],assignPublicIp=DISABLED}" \
            --overrides '{
              "containerOverrides": [{
                "name": "solo-founder-production-api",
                "command": ["npx", "prisma", "migrate", "deploy", "--schema", "/app/packages/api/prisma/schema.prisma"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task started: $TASK_ARN"

          # Wait for migration to complete
          aws ecs wait tasks-stopped --cluster "$CLUSTER_ARN" --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_ARN" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "Database migration completed successfully."
