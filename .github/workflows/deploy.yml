name: Launch Solo Founder OS to AWS
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  launch:
    name: Authenticate and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS Connection
        run: aws sts get-caller-identity

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build Application
        run: npm run build

      # CDK bootstrap is a one-time account/region setup that requires elevated
      # CloudFormation permissions (cloudformation:DescribeStacks, CreateStack,
      # etc.) beyond what this deployment role carries.  Run it manually once:
      #   cd packages/infra && npx cdk bootstrap aws://ACCOUNT/REGION
      # or via: npm run bootstrap -- --stage production
      # DO NOT add it back here — it will fail on every push with AccessDenied.

      - name: Publish to AWS
        run: cd packages/infra && npx cdk deploy --all --require-approval never
