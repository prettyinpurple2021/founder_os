name: Launch Solo Founder OS to AWS
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=packages/api

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: |
          npx tsc -p packages/api/tsconfig.json --noEmit
          npx tsc -p packages/infra/tsconfig.json --noEmit

      - name: Run API Tests
        run: npm run test:api

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS Connection
        run: aws sts get-caller-identity

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=packages/api

      - name: Build Application
        run: npm run build

      - name: Deploy Infrastructure (networking, database, CDN)
        run: |
          cd packages/infra
          npx cdk deploy production-network production-database production-cdn --context stage=production --require-approval never

      - name: Deploy Container Stack (tasks start at desired count)
        run: |
          cd packages/infra
          # Deploy with desiredCount=0 to prevent circuit breaker during migrations.
          # The "Scale Up" step below will start tasks after migrations succeed.
          npx cdk deploy production-container --context stage=production --context initialDeploy=true --require-approval never

      - name: Run Database Migration
        run: |
          CLUSTER_NAME="solo-founder-production-cluster"

          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix solo-founder-production-api \
            --sort DESC \
            --query 'taskDefinitionArns[0]' \
            --output text)

          # Get private subnets
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=solo-founder-production-vpc" \
            --query 'Vpcs[0].VpcId' --output text)

          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*PrivateSubnet*" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')

          ECS_SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=solo-founder-production-ecs-sg" \
            --query 'SecurityGroups[0].GroupId' --output text)

          # Get database credentials from Secrets Manager to build DATABASE_URL
          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id /solo-founder-launch-os/production/database/credentials \
            --query 'SecretString' --output text)
          DB_USER=$(echo "$DB_SECRET" | jq -r '.username')
          DB_PASS=$(echo "$DB_SECRET" | jq -r '.password')
          DB_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier solo-founder-production-db \
            --query 'DBInstances[0].Endpoint.Address' --output text)
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/solofounder"

          echo "Running migration task..."
          # First resolve any previously failed migration, then run deploy
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$ECS_SG],assignPublicIp=DISABLED}" \
            --overrides "{
              \"containerOverrides\": [{
                \"name\": \"solo-founder-production-api\",
                \"command\": [\"sh\", \"-c\", \"npx --yes prisma migrate resolve --rolled-back 0001_init --schema /app/packages/api/prisma/schema.prisma 2>/dev/null || true && npx --yes prisma migrate deploy --schema /app/packages/api/prisma/schema.prisma\"],
                \"environment\": [{\"name\": \"DATABASE_URL\", \"value\": \"${DATABASE_URL}\"}]
              }]
            }" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task started: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER_NAME" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed with exit code $EXIT_CODE"
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /ecs/solo-founder-production-api \
              --log-stream-name "api/solo-founder-production-api/$TASK_ID" \
              --limit 50 --query 'events[].message' --output text 2>/dev/null || true
            exit 1
          fi

          echo "Database migration completed successfully."

      - name: Scale Up ECS Service (post-migration)
        run: |
          aws ecs update-service \
            --cluster solo-founder-production-cluster \
            --service solo-founder-production-api \
            --desired-count 1 \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text
          echo "ECS service scaled to 1 task with force new deployment"

      - name: Deploy Monitoring Stack
        run: |
          cd packages/infra
          npx cdk deploy production-monitoring --context stage=production --require-approval never
